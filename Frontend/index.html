  <style>
    .auth-page {
      background: linear-gradient(135deg, #0f172a 0%, #1a2f6e 40%, #1e40af 100%);
    }
    .auth-bg-shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .auth-shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      animation: float 10s infinite ease-in-out;
    }
    .auth-shape:nth-child(1) { width: 400px; height: 400px; top: -100px; right: -100px; animation-delay: 0s; }
    .auth-shape:nth-child(2) { width: 250px; height: 250px; bottom: 50px; left: -80px; animation-delay: 3s; }
    .auth-shape:nth-child(3) { width: 150px; height: 150px; top: 40%; right: 15%; animation-delay: 6s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .or-divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
      font-size: 0.875rem; color: var(--color-text-muted);
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--color-border);
    }
  </style>
</head>
