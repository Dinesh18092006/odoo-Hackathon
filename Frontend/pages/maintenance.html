<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — AssetFlow</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <div class="app-layout">
    <main class="main-content" id="main-content">
      <div class="page-container">
        
        <div class="page-header">
          <div class="page-title">
            <h1>Maintenance Requests</h1>
            <p>Report and track repairs or routine maintenance for assets.</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="Modal.open('maintenance-modal')">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
              Report Issue
            </button>
          </div>
        </div>

        <div class="card">
          <div class="toolbar">
            <select class="filter-select" id="status-filter">
              <option value="">All Statuses</option>
              <option value="reported">Reported</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Asset</th>
                  <th>Issue Description</th>
                  <th>Reporter</th>
                  <th>Priority</th>
                  <th>Status</th>
                  <th>Reported At</th>
                  <th style="width: 120px">Actions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <!-- Filled via JS -->
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <div class="pagination-info" id="page-info">Loading...</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Maintenance Modal -->
  <div class="modal-overlay" id="maintenance-modal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Report Maintenance Issue</h3>
        <button class="modal-close" onclick="Modal.close('maintenance-modal')">×</button>
      </div>
      <div class="modal-body">
        <form id="maintenance-form">
          <div class="form-group">
            <label for="asset_id">Select Asset <span class="required">*</span></label>
            <select id="asset_id" name="asset_id" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority" class="form-control">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label for="description">Issue Description <span class="required">*</span></label>
            <textarea id="description" name="description" class="form-control" rows="4" required></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('maintenance-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-maintenance-btn">Submit Report</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { App, fmt, badge, renderSkeletonRows, Toast, Modal, getFormData } from '../assets/js/core/app.js';
    import { maintenanceApi, assetsApi } from '../assets/js/core/api.js';
    import { renderLayout } from '../assets/js/components/layout.js';

    window.Modal = Modal;
    window.handleAction = handleAction;

    document.addEventListener('DOMContentLoaded', async () => {
      renderLayout('maintenance');
      await App.init();
      
      document.getElementById('status-filter').addEventListener('change', loadMaintenance);
      document.getElementById('save-maintenance-btn').addEventListener('click', handleSubmit);

      loadAssets();
      loadMaintenance();
    });

    async function loadAssets() {
      try {
        const res = await assetsApi.list({ per_page: 200 });
        const select = document.getElementById('asset_id');
        res.data.items.forEach(a => select.add(new Option(`${a.name} [${a.asset_tag}]`, a.id)));
      } catch (e) {
        console.error(e);
      }
    }

    async function loadMaintenance() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = renderSkeletonRows(7, 6);
      
      try {
        const status = document.getElementById('status-filter').value;
        const params = { per_page: 50 };
        if (status) params.status = status;
        
        const res = await maintenanceApi.list(params);
        const items = res.data.items;
        
        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">No maintenance requests found.</div></td></tr>`;
        } else {
          tbody.innerHTML = items.map(item => `
            <tr>
              <td class="font-medium">${item.asset?.name || 'Unknown'}</td>
              <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${item.description}">
                ${item.description}
              </td>
              <td>${item.reporter?.first_name} ${item.reporter?.last_name}</td>
              <td>
                <span class="badge ${item.priority === 'critical' ? 'badge-danger' : item.priority === 'high' ? 'badge-warning' : 'badge-secondary'}">
                  ${item.priority}
                </span>
              </td>
              <td>${badge(item.status)}</td>
              <td>${fmt.date(item.created_at)}</td>
              <td class="td-actions">
                ${renderActions(item)}
              </td>
            </tr>
          `).join('');
        }
        document.getElementById('page-info').textContent = `Showing ${items.length} requests`;
      } catch (err) {
        Toast.error('Error', 'Failed to load data');
        tbody.innerHTML = `<tr><td colspan="7" class="text-center" style="color:red">Failed to load data</td></tr>`;
      }
    }

    function renderActions(item) {
      const isManager = ['admin', 'asset_manager'].includes(App.user.role);
      let html = '';

      if (item.status === 'reported' && isManager) {
        html += `<button class="btn btn-sm btn-primary" onclick="handleAction('${item.id}', 'start')">Start</button>`;
      }
      if (item.status === 'in_progress' && isManager) {
        html += `<button class="btn btn-sm btn-success" onclick="handleAction('${item.id}', 'resolve')">Resolve</button>`;
      }
      if (item.status === 'resolved' && isManager) {
        html += `<button class="btn btn-sm btn-secondary" onclick="handleAction('${item.id}', 'close')">Close</button>`;
      }

      return html || '—';
    }

    async function handleAction(id, action) {
      try {
        if (action === 'start') await maintenanceApi.start(id);
        if (action === 'resolve') {
          const cost = prompt("Enter repair cost (optional):", "0.00");
          if (cost === null) return; // cancelled
          await maintenanceApi.resolve(id, { cost: parseFloat(cost) || 0.0, resolution_notes: "Resolved via UI" });
        }
        if (action === 'close') await maintenanceApi.close(id);
        
        Toast.success('Success', `Task ${action}ed`);
        loadMaintenance();
      } catch (err) {
        Toast.error('Error', err.message);
      }
    }

    async function handleSubmit() {
      const data = getFormData('maintenance-form');

      const btn = document.getElementById('save-maintenance-btn');
      btn.disabled = true;
      btn.innerHTML = 'Submitting...';
      
      try {
        await maintenanceApi.create(data);
        Toast.success('Success', 'Maintenance reported');
        Modal.close('maintenance-modal');
        document.getElementById('maintenance-form').reset();
        loadMaintenance();
      } catch (err) {
        Toast.error('Error', err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Report';
      }
    }
  </script>
</body>
</html>
