<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audits — AssetFlow</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <div class="app-layout">
    <main class="main-content" id="main-content">
      <div class="page-container">
        
        <div class="page-header">
          <div class="page-title">
            <h1>Asset Audits</h1>
            <p>Manage and track inventory verification processes.</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="Modal.open('audit-modal')" data-role="admin,asset_manager">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
              Start New Audit
            </button>
          </div>
        </div>

        <div class="card">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Audit Name</th>
                  <th>Status</th>
                  <th>Assigned To</th>
                  <th>Scheduled Date</th>
                  <th>Completed Date</th>
                  <th style="width: 120px">Actions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <!-- Filled via JS -->
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <div class="pagination-info" id="page-info">Loading...</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Audit Modal -->
  <div class="modal-overlay" id="audit-modal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Create Audit Cycle</h3>
        <button class="modal-close" onclick="Modal.close('audit-modal')">×</button>
      </div>
      <div class="modal-body">
        <form id="audit-form">
          <div class="form-group">
            <label for="name">Audit Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g. Q3 IT Inventory Audit">
          </div>
          <div class="form-group">
            <label for="assigned_to_id">Assign To (Auditor) <span class="required">*</span></label>
            <select id="assigned_to_id" name="assigned_to_id" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label for="scheduled_date">Scheduled Date <span class="required">*</span></label>
            <input type="date" id="scheduled_date" name="scheduled_date" class="form-control" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('audit-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-audit-btn">Create Audit</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { App, fmt, badge, renderSkeletonRows, Toast, Modal, getFormData } from '../assets/js/core/app.js';
    import { auditsApi, usersApi } from '../assets/js/core/api.js';
    import { renderLayout } from '../assets/js/components/layout.js';

    window.Modal = Modal;
    window.handleAction = handleAction;

    document.addEventListener('DOMContentLoaded', async () => {
      renderLayout('audits');
      await App.init();
      
      document.getElementById('save-audit-btn').addEventListener('click', handleSubmit);

      loadUsers();
      loadAudits();
    });

    async function loadUsers() {
      try {
        const res = await usersApi.list({ per_page: 100 });
        const select = document.getElementById('assigned_to_id');
        res.data.items.forEach(u => select.add(new Option(`${u.first_name} ${u.last_name}`, u.id)));
      } catch (e) {
        console.error(e);
      }
    }

    async function loadAudits() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = renderSkeletonRows(6, 5);
      
      try {
        const res = await auditsApi.list({ per_page: 50 });
        const items = res.data.items;
        
        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No audits found.</div></td></tr>`;
        } else {
          tbody.innerHTML = items.map(item => `
            <tr>
              <td class="font-medium">${item.name}</td>
              <td>${badge(item.status)}</td>
              <td>${item.assignee?.first_name} ${item.assignee?.last_name}</td>
              <td>${fmt.date(item.scheduled_date)}</td>
              <td>${item.completed_date ? fmt.date(item.completed_date) : '—'}</td>
              <td class="td-actions">
                ${renderActions(item)}
              </td>
            </tr>
          `).join('');
        }
        document.getElementById('page-info').textContent = `Showing ${items.length} audits`;
      } catch (err) {
        Toast.error('Error', 'Failed to load audits');
        tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="color:red">Failed to load data</td></tr>`;
      }
    }

    function renderActions(item) {
      const isManager = ['admin', 'asset_manager'].includes(App.user.role);
      const isAssignee = item.assigned_to_id === App.user.id;
      let html = '';

      if (item.status === 'scheduled' && (isManager || isAssignee)) {
        html += `<button class="btn btn-sm btn-primary" onclick="handleAction('${item.id}', 'start')">Start</button>`;
      }
      if (item.status === 'in_progress' && (isManager || isAssignee)) {
        html += `<button class="btn btn-sm btn-success" onclick="handleAction('${item.id}', 'complete')">Complete</button>`;
      }

      return html || '—';
    }

    async function handleAction(id, action) {
      try {
        if (action === 'start') await auditsApi.start(id);
        if (action === 'complete') await auditsApi.complete(id);
        
        Toast.success('Success', `Audit ${action}ed`);
        loadAudits();
      } catch (err) {
        Toast.error('Error', err.message);
      }
    }

    async function handleSubmit() {
      const data = getFormData('audit-form');

      const btn = document.getElementById('save-audit-btn');
      btn.disabled = true;
      btn.innerHTML = 'Submitting...';
      
      try {
        await auditsApi.create(data);
        Toast.success('Success', 'Audit created');
        Modal.close('audit-modal');
        document.getElementById('audit-form').reset();
        loadAudits();
      } catch (err) {
        Toast.error('Error', err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Audit';
      }
    }
  </script>
</body>
</html>
