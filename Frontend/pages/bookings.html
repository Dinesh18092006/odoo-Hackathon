<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings — AssetFlow</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <div class="app-layout">
    <main class="main-content" id="main-content">
      <div class="page-container">
        
        <div class="page-header">
          <div class="page-title">
            <h1>Resource Bookings</h1>
            <p>Schedule temporary usage of shared resources like projectors and vehicles.</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="Modal.open('booking-modal')">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              New Booking
            </button>
          </div>
        </div>

        <div class="card">
          <div class="toolbar">
            <select class="filter-select" id="status-filter">
              <option value="">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="confirmed">Confirmed</option>
              <option value="active">Active</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Asset</th>
                  <th>User</th>
                  <th>Start Date</th>
                  <th>End Date</th>
                  <th>Status</th>
                  <th style="width: 120px">Actions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <!-- Filled via JS -->
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <div class="pagination-info" id="page-info">Loading...</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Booking Modal -->
  <div class="modal-overlay" id="booking-modal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Create Booking</h3>
        <button class="modal-close" onclick="Modal.close('booking-modal')">×</button>
      </div>
      <div class="modal-body">
        <form id="booking-form">
          <div class="form-group">
            <label for="asset_id">Select Asset <span class="required">*</span></label>
            <select id="asset_id" name="asset_id" class="form-control" required></select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="start_time">Start Time <span class="required">*</span></label>
              <input type="datetime-local" id="start_time" name="start_time" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="end_time">End Time <span class="required">*</span></label>
              <input type="datetime-local" id="end_time" name="end_time" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label for="purpose">Purpose</label>
            <textarea id="purpose" name="purpose" class="form-control" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('booking-modal')">Cancel</button>
        <button class="btn btn-primary" id="save-booking-btn">Submit</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { App, fmt, badge, renderSkeletonRows, Toast, Modal, getFormData } from '../assets/js/core/app.js';
    import { bookingsApi, assetsApi } from '../assets/js/core/api.js';
    import { renderLayout } from '../assets/js/components/layout.js';

    window.Modal = Modal;
    window.handleAction = handleAction;

    document.addEventListener('DOMContentLoaded', async () => {
      renderLayout('bookings');
      await App.init();
      
      document.getElementById('status-filter').addEventListener('change', loadBookings);
      document.getElementById('save-booking-btn').addEventListener('click', handleSubmit);

      loadAssets();
      loadBookings();
    });

    async function loadAssets() {
      try {
        const res = await assetsApi.list({ per_page: 200 });
        const select = document.getElementById('asset_id');
        res.data.items.forEach(a => select.add(new Option(`${a.name} [${a.asset_tag}]`, a.id)));
      } catch (e) {
        console.error(e);
      }
    }

    async function loadBookings() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = renderSkeletonRows(6, 6);
      
      try {
        const status = document.getElementById('status-filter').value;
        const params = { per_page: 50 };
        if (status) params.status = status;
        
        const res = await bookingsApi.list(params);
        const items = res.data.items;
        
        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No bookings found.</div></td></tr>`;
        } else {
          tbody.innerHTML = items.map(item => `
            <tr>
              <td class="font-medium">${item.asset?.name || 'Unknown'}</td>
              <td>${item.user?.first_name} ${item.user?.last_name}</td>
              <td>${fmt.date(item.start_time, true)}</td>
              <td>${fmt.date(item.end_time, true)}</td>
              <td>${badge(item.status)}</td>
              <td class="td-actions">
                ${renderActions(item)}
              </td>
            </tr>
          `).join('');
        }
        document.getElementById('page-info').textContent = `Showing ${items.length} bookings`;
      } catch (err) {
        Toast.error('Error', 'Failed to load bookings');
        tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="color:red">Failed to load data</td></tr>`;
      }
    }

    function renderActions(item) {
      const isManager = ['admin', 'asset_manager'].includes(App.user.role);
      const isOwner = item.user_id === App.user.id;
      let html = '';

      if (item.status === 'pending') {
        if (isManager) html += `<button class="btn btn-sm btn-primary" onclick="handleAction('${item.id}', 'confirm')">Confirm</button>`;
        if (isManager || isOwner) html += `<button class="btn btn-sm btn-secondary" onclick="handleAction('${item.id}', 'cancel')">Cancel</button>`;
      }
      
      if (item.status === 'confirmed' && (isManager || isOwner)) {
         html += `<button class="btn btn-secondary btn-sm" onclick="handleAction('${item.id}', 'start')">Start</button>`;
      }
      
      if (item.status === 'active' && (isManager || isOwner)) {
         html += `<button class="btn btn-secondary btn-sm" onclick="handleAction('${item.id}', 'complete')">Complete</button>`;
      }

      return html || '—';
    }

    async function handleAction(id, action) {
      try {
        if (action === 'confirm') await bookingsApi.confirm(id);
        if (action === 'cancel') await bookingsApi.cancel(id);
        if (action === 'start') await bookingsApi.start(id);
        if (action === 'complete') await bookingsApi.complete(id);
        
        Toast.success('Success', `Booking ${action}ed`);
        loadBookings();
      } catch (err) {
        Toast.error('Error', err.message);
      }
    }

    async function handleSubmit() {
      const data = getFormData('booking-form');
      
      const startObj = new Date(data.start_time);
      const endObj = new Date(data.end_time);
      data.start_time = startObj.toISOString();
      data.end_time = endObj.toISOString();

      const btn = document.getElementById('save-booking-btn');
      btn.disabled = true;
      btn.innerHTML = 'Submitting...';
      
      try {
        await bookingsApi.create(data);
        Toast.success('Success', 'Booking created');
        Modal.close('booking-modal');
        document.getElementById('booking-form').reset();
        loadBookings();
      } catch (err) {
        Toast.error('Error', err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    }
  </script>
</body>
</html>
