<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Logs — AssetFlow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">📋 Activity Logs</span>
      </div>
    </div>

    <div class="page-body">
      <!-- Filters -->
      <div class="filter-row">
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="Search action, asset, user…">
        </div>
        <select class="form-select" style="width:160px;" id="filter-action">
          <option value="">All Actions</option>
          <option>create</option>
          <option>update</option>
          <option>delete</option>
          <option>allocate</option>
          <option>return</option>
          <option>book</option>
          <option>maintenance</option>
        </select>
        <input type="date" id="filter-from" class="form-control" style="width:160px;" title="From date">
        <input type="date" id="filter-to" class="form-control" style="width:160px;" title="To date">
        <button class="btn btn-secondary btn-sm" onclick="loadLogs()">Apply</button>
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <div id="logs-table-wrap">
          <div style="display:flex;justify-content:center;padding:48px;"><div class="spinner"></div></div>
        </div>
      </div>

      <div style="display:flex;justify-content:center;gap:12px;margin-top:16px;">
        <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="changePage(-1)" disabled>← Previous</button>
        <span id="page-info" class="text-muted text-sm" style="display:flex;align-items:center;">Page 1</span>
        <button class="btn btn-secondary btn-sm" id="btn-next" onclick="changePage(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<script src="core.js"></script>
<script src="sidebar.js"></script>
<script>
if (!requireAuth()) throw new Error();
injectSidebar(); initSidebar();

let page = 1;
const PER_PAGE = 50;

async function loadLogs() {
  const search = document.getElementById('search-input').value;
  const action = document.getElementById('filter-action').value;
  const from   = document.getElementById('filter-from').value;
  const to     = document.getElementById('filter-to').value;

  let url = `/api/logs/?skip=${(page-1)*PER_PAGE}&limit=${PER_PAGE}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  if (action) url += `&action=${action}`;
  if (from)   url += `&from_date=${from}`;
  if (to)     url += `&to_date=${to}`;

  const wrap = document.getElementById('logs-table-wrap');
  wrap.innerHTML = '<div style="display:flex;justify-content:center;padding:48px;"><div class="spinner"></div></div>';
  try {
    const data = await apiFetch(url);
    document.getElementById('page-info').textContent = `Page ${page}`;
    document.getElementById('btn-prev').disabled = page <= 1;
    document.getElementById('btn-next').disabled = data.length < PER_PAGE;

    if (!data.length) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>No activity logs found.</p></div>';
      return;
    }
    wrap.innerHTML = `<div class="table-wrap"><table>
      <thead><tr>
        <th>Timestamp</th><th>Action</th><th>Entity</th><th>Details</th><th>Performed By</th>
      </tr></thead>
      <tbody>
        ${data.map(l => {
          const actionColor = {
            create:'green', update:'blue', delete:'red', allocate:'teal',
            return:'green', book:'purple', maintenance:'orange'
          }[l.action] || 'gray';
          return `<tr>
            <td style="white-space:nowrap;font-size:12px;color:var(--text-muted);">${fmtDateTime(l.created_at)}</td>
            <td><span class="badge badge-${actionColor}">${l.action}</span></td>
            <td>${l.entity_type ? `<strong>${l.entity_type}</strong>${l.entity_id ? ' #'+l.entity_id : ''}` : '—'}</td>
            <td style="font-size:13px;max-width:320px;word-break:break-word;">${l.description || l.details || '—'}</td>
            <td>${l.user_name || '<span class="text-muted">System</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>`;
  } catch(e) { toast(e.message,'error'); }
}

function changePage(delta) {
  page = Math.max(1, page + delta);
  loadLogs();
}

document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(window._st);
  window._st = setTimeout(() => { page = 1; loadLogs(); }, 350);
});

loadLogs();
</script>
</body>
</html>
